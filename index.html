<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Typing Speed Test</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;700&family=Space+Grotesk:wght@500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Demo Day App</p>
        <h1>Typing Speed Test</h1>
        <p class="subtitle">
          Type the highlighted passage, track your WPM, and see your accuracy in
          real time.
        </p>
      </section>

      <section class="panel">
        <div class="stats" aria-label="Typing stats">
          <div class="stat-card">
            <span class="stat-label">Time</span>
            <strong id="timeLeft">60s</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">WPM</span>
            <strong id="wpm">0</strong>
          </div>
          <div class="stat-card">
            <span class="stat-label">Accuracy</span>
            <strong id="accuracy">100%</strong>
          </div>
        </div>

        <div class="prompt-box" id="prompt" aria-live="polite"></div>

        <label class="input-label" for="typingInput">Start typing</label>
        <textarea
          id="typingInput"
          rows="6"
          spellcheck="false"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          placeholder="Click here and start typing..."
        ></textarea>

        <div class="actions">
          <button id="restartButton" type="button">New Prompt</button>
        </div>
      </section>
    </main>

    <script src="./script.js"></script>
  </body>
</html>
